<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ortigas Land Properties</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

.hero {
  background: #111;
  color: white;
  padding: 60px 20px;
}

.btn {
  display: inline-block;
  padding: 12px 18px;
  margin: 10px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

/* Carousel */
.carousel {
  position: relative;
  max-width: 900px;
  margin: 40px auto;
  overflow: hidden;
  border-radius: 10px;
}

.slides {
  display: flex;
  transition: transform 0.5s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
}

/* Navigation */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

.section {
  padding: 40px 20px;
}

.contact {
  background: #222;
  color: white;
  padding: 30px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Ortigas Premium Properties</h1>
  <p>By Jerry Arcueno</p>

  <a href="https://docs.google.com/forms/d/1crpjax_Gj99vJSM4xENr4hCF7voJ9-Mw7_rK8CHvwpY/viewform" class="btn" target="_blank">
  Inquire Now
  </a>
</div>

<!-- CAROUSEL -->
<div class="carousel">
  <div class="slides" id="slides">

    <!-- Empress -->
    <img src="https://assets.ortigas.com.ph/data/uploads/2019/10/Empress_01.jpg">

    <!-- Galleon -->
    <img src="https://assets.ortigas.com.ph/data/uploads/2019/07/Galleon_Thumbnail_01.jpg">

    <!-- Olin / Generic Ortigas -->
    <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">

    <!-- Maple -->
    <img src="https://assets.ortigas.com.ph/data/uploads/2019/02/Maple_at_Verdant_Thumbnail.jpg">

    <!-- Costa Calatagan -->
    <img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">

  </div>

  <button class="nav-btn prev" onclick="prevSlide()">&#10094;</button>
  <button class="nav-btn next" onclick="nextSlide()">&#10095;</button>
</div>

<div class="section">
  <h2>Book a Private Viewing</h2>
  <p>No commitment. Experience the units firsthand.</p>

  <a href="https://docs.google.com/forms/d/1crpjax_Gj99vJSM4xENr4hCF7voJ9-Mw7_rK8CHvwpY/viewform" class="btn" target="_blank">
  Inquire Now
  </a>
</div>

<div class="contact">
  <h2>Contact Jerry Arcueno</h2>

  <a href="tel:09071324435" class="btn">Call</a>

  <a href="viber://chat?number=+639071324335" class="btn">Viber</a>

  <a href="https://www.facebook.com/share/1MjnX2VWoB/?mibextid=wwXIfr" class="btn" target="_blank">
  Messenger
  </a>
</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

function showSlide() {
  slides.style.transform = "translateX(" + (-index * 100) + "%)";
}

function nextSlide() {
  index = (index + 1) % totalSlides;
  showSlide();
}

function prevSlide() {
  index = (index - 1 + totalSlides) % totalSlides;
  showSlide();
}
</script>

</body>
</html>
